  <rect x="54" y="44" width="4" height="4" fill="#6888b4"/>
  <rect x="58" y="44" width="4" height="4" fill="#111122"/>

  <!-- row y=48 -->
  <rect x="18" y="48" width="4" height="4" fill="#6888b4"/>
  <rect x="22" y="48" width="4" height="4" fill="#b4c8dc"/>
  <rect x="26" y="48" width="4" height="4" fill="#7898b8"/>
  <rect x="30" y="48" width="4" height="4" fill="#c8d4e4"/>
  <rect x="34" y="48" width="4" height="4" fill="#6888b4"/>
  <rect x="38" y="48" width="4" height="4" fill="#7898b8"/>
  <rect x="42" y="48" width="4" height="4" fill="#c8d4e4"/>
  <rect x="46" y="48" width="4" height="4" fill="#6888b4"/>
  <rect x="50" y="48" width="4" height="4" fill="#b4c8dc"/>
  <rect x="54" y="48" width="4" height="4" fill="#7898b8"/>
  <rect x="58" y="48" width="4" height="4" fill="#111122"/>

  <!-- row y=52 -->
  <rect x="18" y="52" width="4" height="4" fill="#111122"/>
  <rect x="22" y="52" width="4" height="4" fill="#6888b4"/>
  <rect x="26" y="52" width="4" height="4" fill="#c0cee0"/>
  <rect x="30" y="52" width="4" height="4" fill="#7898b8"/>
  <rect x="34" y="52" width="4" height="4" fill="#6888b4"/>
  <rect x="38" y="52" width="4" height="4" fill="#c0cee0"/>
  <rect x="42" y="52" width="4" height="4" fill="#7898b8"/>
  <rect x="46" y="52" width="4" height="4" fill="#6888b4"/>
  <rect x="50" y="52" width="4" height="4" fill="#c0cee0"/>
  <rect x="54" y="52" width="4" height="4" fill="#111122"/>

  <!-- row y=56 -->
  <rect x="22" y="56" width="4" height="4" fill="#111122"/>
  <rect x="26" y="56" width="4" height="4" fill="#7898b8"/>
  <rect x="30" y="56" width="4" height="4" fill="#6888b4"/>
  <rect x="34" y="56" width="4" height="4" fill="#c8d4e4"/>
  <rect x="38" y="56" width="4" height="4" fill="#7898b8"/>
  <rect x="42" y="56" width="4" height="4" fill="#6888b4"/>
  <rect x="46" y="56" width="4" height="4" fill="#c8d4e4"/>
  <rect x="50" y="56" width="4" height="4" fill="#111122"/>

  <!-- row y=60 – drooping tips -->
  <rect x="26" y="60" width="4" height="4" fill="#111122"/>
  <rect x="30" y="60" width="4" height="4" fill="#6888b4"/>
  <rect x="34" y="60" width="4" height="4" fill="#7898b8"/>
  <rect x="38" y="60" width="4" height="4" fill="#6888b4"/>
