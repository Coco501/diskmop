<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <defs>
    <clipPath id="dk">
      <circle cx="26" cy="26" r="23"/>
    </clipPath>
  </defs>

  <!-- ── DISK ── -->
  <!-- dark border -->
  <circle cx="26" cy="26" r="25" fill="#111122"/>

  <!-- iridescent surface, clipped to disk -->
  <g clip-path="url(#dk)">
    <!-- base silver-lavender -->
    <rect x="3"  y="3"  width="46" height="46" fill="#acb0cc"/>
    <!-- green iris – top-left -->
    <rect x="4"  y="4"  width="16" height="12" fill="#b8cca8"/>
    <rect x="8"  y="8"  width="10" height="8"  fill="#9ec484" opacity=".88"/>
    <!-- yellow – top-right of centre -->
    <rect x="20" y="4"  width="12" height="10" fill="#d8cc88" opacity=".85"/>
    <!-- blue-violet – left mid -->
    <rect x="3"  y="18" width="12" height="12" fill="#8090c8" opacity=".80"/>
    <!-- silver – right -->
    <rect x="22" y="14" width="27" height="14" fill="#c0c4d8"/>
    <!-- bottom -->
    <rect x="4"  y="32" width="16" height="17" fill="#9898bc" opacity=".85"/>
    <rect x="18" y="34" width="31" height="15" fill="#acb0cc"/>
    <!-- specular highlight -->
    <rect x="6"  y="6"  width="8"  height="4"  fill="#e4ecfc" opacity=".90"/>
  </g>

  <!-- centre ring -->
  <circle cx="26" cy="26" r="10" fill="#dce0f0"/>
  <circle cx="26" cy="26" r="7"  fill="#f0f4fc"/>
  <!-- hole -->
  <circle cx="26" cy="26" r="4"  fill="#111122"/>

  <!-- ── MOP HANDLE ── -->
  <!-- dark shadow edge (right/bottom of each block) -->
  <rect x="60" y="0"  width="4" height="2" fill="#1c0e04"/>
  <rect x="58" y="4"  width="2" height="4" fill="#1c0e04"/>
  <rect x="56" y="8"  width="2" height="4" fill="#1c0e04"/>
  <rect x="54" y="12" width="2" height="4" fill="#1c0e04"/>
  <rect x="52" y="16" width="2" height="4" fill="#1c0e04"/>
  <rect x="50" y="20" width="2" height="4" fill="#1c0e04"/>
  <rect x="48" y="24" width="2" height="4" fill="#1c0e04"/>
  <rect x="46" y="28" width="2" height="4" fill="#1c0e04"/>
  <rect x="44" y="32" width="2" height="4" fill="#1c0e04"/>
  <rect x="42" y="36" width="2" height="4" fill="#1c0e04"/>

  <!-- main handle blocks – alternating tan / dark brown -->
  <rect x="56" y="0"  width="4" height="4" fill="#cc9050"/>
  <rect x="54" y="4"  width="4" height="4" fill="#b07838"/>
  <rect x="52" y="8"  width="4" height="4" fill="#cc9050"/>
  <rect x="50" y="12" width="4" height="4" fill="#b07838"/>
  <rect x="48" y="16" width="4" height="4" fill="#cc9050"/>
  <rect x="46" y="20" width="4" height="4" fill="#b07838"/>
  <rect x="44" y="24" width="4" height="4" fill="#cc9050"/>
  <rect x="42" y="28" width="4" height="4" fill="#b07838"/>
  <rect x="40" y="32" width="4" height="4" fill="#cc9050"/>
  <rect x="38" y="36" width="4" height="4" fill="#b07838"/>

  <!-- ferrule / head connector -->
  <rect x="30" y="38" width="12" height="4" fill="#334878"/>

  <!-- ── MOP HEAD (blue pixel-art fluff) ── -->

  <!-- row y=40 -->
  <rect x="22" y="40" width="4" height="4" fill="#111122"/>
  <rect x="26" y="40" width="4" height="4" fill="#6888b4"/>
  <rect x="30" y="40" width="4" height="4" fill="#c0cee0"/>
  <rect x="34" y="40" width="4" height="4" fill="#7898b8"/>
  <rect x="38" y="40" width="4" height="4" fill="#6888b4"/>
  <rect x="42" y="40" width="4" height="4" fill="#b4c8dc"/>
  <rect x="46" y="40" width="4" height="4" fill="#7898b8"/>
  <rect x="50" y="40" width="4" height="4" fill="#c0cee0"/>
  <rect x="54" y="40" width="4" height="4" fill="#111122"/>

  <!-- row y=44 -->
  <rect x="18" y="44" width="4" height="4" fill="#111122"/>
  <rect x="22" y="44" width="4" height="4" fill="#7898b8"/>
  <rect x="26" y="44" width="4" height="4" fill="#c0cee0"/>
  <rect x="30" y="44" width="4" height="4" fill="#6888b4"/>
  <rect x="34" y="44" width="4" height="4" fill="#b4c8dc"/>
